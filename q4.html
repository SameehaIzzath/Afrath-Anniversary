<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Afrath — a little question</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Marcellus&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="love.css">
<style>
  body{
    background:radial-gradient(ellipse at 50% 90%, #8a1f33 0%, var(--rose) 50%, #260509 100%);
    color:var(--blush);
  }
  button.q-next{
    font-family:'Marcellus', serif;
    cursor:pointer;
  }
</style>
</head>
<body>
<div class="grain"></div>

<a href="q3.html" class="q-back">← back</a>

<div class="q-page">
  <div class="q-progress">
    <span class="done"></span><span class="done"></span><span class="done"></span><span class="active"></span>
  </div>
  <span class="q-eyebrow" style="color:var(--gold-soft)">Question four, the last one</span>
  <h1 class="q-title">Finish this for me: <em>"I promise you..."</em></h1>

  <div class="q-textwrap">
    <textarea id="answer4" placeholder="...write your promise, I'll keep it safe"></textarea>
  </div>
  <p class="q-reaction" id="reaction"></p>

  <div class="q-nav">
    <button class="q-next" id="nextBtn">Send my answers to her →</button>
  </div>
  <p style="margin-top:18px; font-size:0.85rem; opacity:0.6; max-width:340px;">this opens your email app with your answers filled in — just hit send</p>
</div>

<script>
  const ta = document.getElementById('answer4');
  const reaction = document.getElementById('reaction');
  const nextBtn = document.getElementById('nextBtn');

  ta.addEventListener('input', () => {
    if(ta.value.trim().length > 0){
      nextBtn.classList.add('enabled');
      reaction.textContent = "I'll hold you to it, gently.";
      reaction.classList.add('show');
      try{ localStorage.setItem('q4', ta.value.trim()); }catch(e){}
    } else {
      nextBtn.classList.remove('enabled');
      reaction.classList.remove('show');
    }
  });

  nextBtn.addEventListener('click', () => {
    if(!nextBtn.classList.contains('enabled')) return;

    let q1, q2, q3, q4;
    try{
      q1 = localStorage.getItem('q1') || '(skipped)';
      q2 = localStorage.getItem('q2') || '(skipped)';
      q3 = localStorage.getItem('q3') || '(skipped)';
      q4 = localStorage.getItem('q4') || '(skipped)';
    }catch(e){
      q1 = q2 = q3 = q4 = '(could not read answer)';
    }

    const subject = "My answers, from your husband";
    const body =
      "Does he love me?\n" + q1 + "\n\n" +
      "What he loves most about me:\n" + q2 + "\n\n" +
      "What \"us\" means to him:\n" + q3 + "\n\n" +
      "His promise to me:\n" + q4;

    const mailto = "mailto:sameehaizzath@gmail.com?subject=" +
      encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);

    window.location.href = mailto;

    // give the email app a moment to open, then continue to the story
    setTimeout(() => {
      window.location.href = "story.html";
    }, 1200);
  });
</script>
</body>
</html>
